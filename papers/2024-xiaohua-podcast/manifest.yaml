# 논문 메타데이터 + 코퍼스 버전 핀 (두 저장소를 잇는 다리)
paper:
  title: 인성교육을 위한 명청 소화 팟캐스트 (예시)
  venue: 중국어문논총           # KCI 게재지
  year: 2024
  status: published            # draft / under-review / published
  doi: ""                      # 게재 후 기입

# 사용한 코퍼스 버전을 고정한다. 이중 안전장치:
#  (1) version + zenodo_doi  → 최신본과의 후속 비교가 가능
#  (2) extract               → 그때 쓴 데이터 동결본을 폴더 안에 동봉(자기완결)
corpus:
  repo: https://github.com/<user>/xiaohua-corpus
  version: v0.3
  zenodo_doi: ""               # 해당 release의 DOI
  extract: data-raw/corpus-extract-v0.3.jsonl

data_sources:
  - name: 雲四庫 검색 결과
    tool: 雲四庫
    accessed: 2024-03-12
    note: 본문 저작권 가능성 → 비공개. SOURCES.md에 수집법만 기록.
  - name: 청취자 설문
    tool: Google Forms
    accessed: 2024-04-02
    note: 개인정보 포함 → data-raw 비공개.

environment: env/requirements.txt
